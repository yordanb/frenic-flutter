name: frenic_mega_dashboard
description: FRENIC-MEGA VFD Modbus RTU Dashboard - Production Grade
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # USB Serial for Android (FTDI / CH340)
  usb_serial: ^0.5.2

  # Charts & Visualization
  fl_chart: ^0.68.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0

  # Utilities
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.4.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.6
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/
